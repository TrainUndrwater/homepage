<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg { fill: #ffffff; }
    .fg { fill: #000000; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #000000; }
      .fg { fill: #ffffff; }
    }
  </style>
  <rect class="bg" width="100" height="100"/>
  <text class="fg" x="50" y="52" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="900" font-size="88">C</text>
</svg>
